<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Redirigiendo al panel de administración...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=/admin">
    <script>window.location.replace('/admin');</script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0a0a0a; color: #fbbf24; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: 2rem; }
        .spinner { border: 3px solid rgba(251, 191, 36, 0.2); border-top: 3px solid #fbbf24; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 1.5rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a { color: #fbbf24; text-decoration: underline; }
        p { color: #a3a3a3; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Redirigiendo al panel de administración...</h1>
        <p>Si no eres redirigido automáticamente, <a href="/admin">haz clic aquí</a>.</p>
    </div>
</body>
</html>
